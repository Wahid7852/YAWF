appId: io.github.wahid7852.YAWF
productName: YAWF
copyright: Copyright © Wahid7852

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - build/icons/**/*
  - package.json
  - "!**/*.map"

linux:
  icon: build/icons
  category: Network
  synopsis: An unofficial WhatsApp desktop application for Linux
  description: >-
    Wraps WhatsApp Web with crash auto-recovery, idle heap reset, multi-profile
    support, clipboard image paste, screenshot-to-chat, and markdown shortcuts.
  mimeTypes:
    - x-scheme-handler/whatsapp
  executableName: yawf
  # arm64 isn't listed: nothing here has been built or tested for it, and the
  # CI runner is x64-only with no cross-build step, so declaring arm64 targets
  # would just be an unverified claim in the config.
  target:
    - target: deb
      arch: [x64]
    - target: AppImage
      arch: [x64]
    - target: snap
      arch: [x64]
    - target: rpm
      arch: [x64]
    - target: pacman
      arch: [x64]

deb:
  depends:
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - libatspi2.0-0
    - libsecret-1-0
    - xdg-utils

rpm:
  depends:
    - libnotify
    - nss
    - libXScrnSaver
    - libXtst
    - at-spi2-core
    - libsecret
    - xdg-utils

snap:
  confinement: strict
  grade: stable
  plugs:
    - default
    - desktop
    - desktop-legacy
    - wayland
    - x11
    - unity7
    - network
    - browser-support
    - camera
    - audio-playback
    - audio-record
    - password-manager-service

publish: null
