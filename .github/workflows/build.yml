name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          for f in $(find src -name "*.js"); do node --check "$f"; done

      - name: Build (unpacked, no packaging)
        run: npx electron-builder --dir
