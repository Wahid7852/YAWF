name: Release

on:
  push:
    branches: [ release ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # rpmbuild isn't on ubuntu-latest by default, electron-builder's rpm
      # target needs it. bsdtar (libarchive-tools) isn't either, and fpm's
      # pacman backend needs it to build the .MTREE metadata file - that one
      # only showed up by actually running this in CI, since the dev machine
      # this pipeline was written on is Arch-based and has bsdtar as part of
      # the base system, so the gap was invisible locally.
      - name: Install rpm and pacman build tools
        run: sudo apt-get update && sudo apt-get install -y rpm libarchive-tools

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Set Version
        id: set-version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${version}" >> "$GITHUB_ENV"
          # CHANGELOG.md entries are keyed by the base version (e.g. "## 3.0.0"),
          # not the prerelease suffix, so strip -rc.1 etc. before matching it.
          echo "CHANGELOG_VERSION=${version%%-*}" >> "$GITHUB_ENV"
          if [[ "$version" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      # deb/AppImage/rpm/pacman all use electron-builder's fpm-based pipeline,
      # verified locally against this repo before this job was written (built,
      # then dpkg-deb --info / pacman -U / AppImage launch all inspected). snap
      # is deliberately left out: it needs the dedicated snapcore/action-build
      # action to build reliably in CI (the old C++ job used exactly that), and
      # electron-builder's own snap target (raw snapcraft) hasn't been verified
      # here - do that as a follow-up rather than ship an untested CI step.
      - name: Build Linux packages
        run: npx electron-builder --linux deb AppImage rpm pacman --publish never

      - name: Extract Changelog
        id: changelog
        run: |
          body=$(awk '/^## \[?'"$CHANGELOG_VERSION"'\]?/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md | sed '/^[[:space:]]*$/d')
          printf 'body<<%s\n%s\n%s\n' "EOF" "$body" "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_VERSION }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}
          files: |
            dist/*.deb
            dist/*.AppImage
            dist/*.rpm
            dist/*.pacman
