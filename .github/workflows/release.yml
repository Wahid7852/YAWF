name: Release

on:
  push:
    branches: [ release ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Set Version
        id: set-version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${version}" >> "$GITHUB_ENV"

      # deb/AppImage/rpm/pacman all use electron-builder's fpm-based pipeline,
      # verified locally against this repo before this job was written (built,
      # then dpkg-deb --info / pacman -U / AppImage launch all inspected). snap
      # is deliberately left out: it needs the dedicated snapcore/action-build
      # action to build reliably in CI (the old C++ job used exactly that), and
      # electron-builder's own snap target (raw snapcraft) hasn't been verified
      # here - do that as a follow-up rather than ship an untested CI step.
      - name: Build Linux packages
        run: npx electron-builder --linux deb AppImage rpm pacman --publish never

      - name: Extract Changelog
        id: changelog
        run: |
          body=$(awk '/^## \[?'"$RELEASE_VERSION"'\]?/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md | sed '/^[[:space:]]*$/d')
          printf 'body<<%s\n%s\n%s\n' "EOF" "$body" "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_VERSION }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: |
            dist/*.deb
            dist/*.AppImage
            dist/*.rpm
            dist/*.pacman
