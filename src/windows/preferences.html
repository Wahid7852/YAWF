<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
<title data-i18n="prefs.title">YAWF Preferences</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #1e1e1e; color: #e8e8e8; }
  h1 { font-size: 15px; font-weight: 600; margin: 0 0 16px; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
  .row label { font-size: 13px; }
  .row .hint { display: block; font-size: 11px; color: #888; margin-top: 2px; }
  input[type="number"] { width: 56px; background: #2a2a2a; color: #e8e8e8; border: 1px solid #444; border-radius: 4px; padding: 4px; }
  input[type="checkbox"] { width: 16px; height: 16px; }
</style>
</head>
<body>
  <h1 data-i18n="prefs.heading">Preferences</h1>

  <div class="row">
    <label for="ctrlEnterToSend">
      <span data-i18n="prefs.ctrlEnter.label">Send with Ctrl+Enter</span>
      <span class="hint" data-i18n="prefs.ctrlEnter.hint">Enter inserts a newline; Ctrl+Enter sends</span>
    </label>
    <input type="checkbox" id="ctrlEnterToSend" />
  </div>

  <div class="row">
    <label for="closeToTray" data-i18n="prefs.closeToTray">Close button minimizes to tray</label>
    <input type="checkbox" id="closeToTray" />
  </div>

  <div class="row">
    <label for="startMinimized" data-i18n="prefs.startMinimized">Start minimized to tray</label>
    <input type="checkbox" id="startMinimized" />
  </div>

  <div class="row">
    <label for="autostart" data-i18n="prefs.autostart">Launch at login</label>
    <input type="checkbox" id="autostart" />
  </div>

  <div class="row">
    <label for="idleReloadHours">
      <span data-i18n="prefs.idleReload.label">Idle heap reset (hours)</span>
      <span class="hint" data-i18n="prefs.idleReload.hint">Reload WhatsApp Web after this long with no input. 0 disables it.</span>
    </label>
    <input type="number" id="idleReloadHours" min="0" max="24" />
  </div>

  <div class="row">
    <label for="apiEnabled">
      <span data-i18n="prefs.apiEnabled.label">Enable automation API</span>
      <span class="hint" data-i18n="prefs.apiEnabled.hint">Manage keys, webhooks and activity from the tray's API Dashboard</span>
    </label>
    <input type="checkbox" id="apiEnabled" />
  </div>

  <div class="row">
    <label for="apiPort" data-i18n="prefs.apiPort.label">Automation API port</label>
    <input type="number" id="apiPort" min="1" max="65535" />
  </div>

  <div class="row">
    <label for="apiBridgeEnabled">
      <span data-i18n="prefs.apiBridgeEnabled.label">Enable WhatsApp bridge (experimental)</span>
      <span class="hint" data-i18n="prefs.apiBridgeEnabled.hint">Lets the API read session/QR status. Reloads WhatsApp Web when toggled.</span>
    </label>
    <input type="checkbox" id="apiBridgeEnabled" />
  </div>

  <script src="i18n-apply.js"></script>
  <script src="preferences-renderer.js"></script>
</body>
</html>
