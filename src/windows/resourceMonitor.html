<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
<title data-i18n="resourceMonitor.title">YAWF Resource Monitor</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #1e1e1e; color: #e8e8e8; }
  h1 { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
  .totals { font-size: 12px; color: #25d366; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; color: #888; font-weight: 500; padding: 4px 8px 4px 0; border-bottom: 1px solid #333; }
  td { padding: 5px 8px 5px 0; border-bottom: 1px solid #262626; font-family: monospace; }
  td.type { font-family: system-ui, sans-serif; }
  tr.browser td.type { color: #25d366; }
</style>
</head>
<body>
  <h1 data-i18n="resourceMonitor.heading">Process resource usage</h1>
  <div class="totals" id="totals">-</div>
  <table>
    <thead>
      <tr>
        <th data-i18n="resourceMonitor.colProcess">Process</th>
        <th data-i18n="resourceMonitor.colPid">PID</th>
        <th data-i18n="resourceMonitor.colCpu">CPU%</th>
        <th data-i18n="resourceMonitor.colRam">RAM (MB)</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <script src="i18n-apply.js"></script>
  <script src="resourceMonitor-renderer.js"></script>
</body>
</html>
